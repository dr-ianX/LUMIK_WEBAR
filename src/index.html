<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no"
/>

<title>LUMIK AR | Immersive Technology</title>

<meta name="description" content="LUMIK - Interactive 3D + AR experiences by visual artist. Videomapping, laser mapping, mixed reality, and immersive audiovisual designs.">

<script
type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
}

model-viewer{
width:100vw;
height:100vh;
background:
radial-gradient(circle at center,#222 0%, #000 100%);
}

#title{
position:absolute;
top:20px;
left:20px;

z-index:100;

color:white;

background:rgba(0,0,0,0.6);

padding:12px 16px;

border-radius:14px;

font-size:20px;

backdrop-filter:blur(10px);
}

#logo-small{
font-size:12px;
color:#aaa;
display:block;
margin-top:4px;
}

#info{

position:absolute;

bottom:90px;

left:50%;

transform:translateX(-50%);

z-index:100;

color:white;

background:rgba(0,0,0,0.5);

padding:10px 16px;

border-radius:14px;

font-size:14px;

backdrop-filter:blur(10px);
text-align:center;
max-width:90%;
}

.ar-button{

background:white;

border:none;

border-radius:14px;

padding:14px 22px;

font-size:18px;

position:absolute;

bottom:20px;

left:50%;

transform:translateX(-50%);
cursor:pointer;
font-weight:bold;

}

.brand-bar{
position:absolute;
top:20px;
right:20px;
z-index:100;
display:flex;
gap:10px;
}

.brand-link{
color:white;
background:rgba(0,0,0,0.6);
padding:8px 12px;
border-radius:10px;
font-size:12px;
text-decoration:none;
backdrop-filter:blur(10px);
transition:background 0.3s;
}

.brand-link:hover{
background:rgba(0,0,0,0.8);
}

</style>

</head>

<body>

<div id="title">
LUMIK AR ✨
<span id="logo-small">by LumiK Technology</span>
</div>

<div class="brand-bar">
<a href="https://lumik-ar.com" class="brand-link" target="_blank">LUMIK</a>
<a href="https://lumik-ar.com/about" class="brand-link" target="_blank">About AR</a>
</div>

<model-viewer

src="./assets/model.glb"

camera-controls

auto-rotate

autoplay

shadow-intensity="1"

exposure="1"

ar

ar-modes="scene-viewer quick-look webxr"

>

<button
slot="ar-button"
class="ar-button"
>
VIEW IN AR
</button>

</model-viewer>

<div id="info">
<b>LUMIK Technology</b><br>
Augmented Reality + Mixed Reality + Videomapping + Laser Mapping<br>
<a href="https://lumik-ar.com" style="color:#4af;" target="_blank">Learn more →</a>
</div>

</body>

</html>
