<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no"
/>

<title>LUMIK AR</title>

<script
type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
}

model-viewer{
width:100vw;
height:100vh;
background:
radial-gradient(circle at center,#222 0%, #000 100%);
}

#title{
position:absolute;
top:20px;
left:20px;

z-index:100;

color:white;

background:rgba(0,0,0,0.6);

padding:12px 16px;

border-radius:14px;

font-size:20px;

backdrop-filter:blur(10px);
}

#info{

position:absolute;

bottom:90px;

left:50%;

transform:translateX(-50%);

z-index:100;

color:white;

background:rgba(0,0,0,0.5);

padding:10px 16px;

border-radius:14px;

font-size:14px;

backdrop-filter:blur(10px);

}

.ar-button{

background:white;

border:none;

border-radius:14px;

padding:14px 22px;

font-size:18px;

position:absolute;

bottom:20px;

left:50%;

transform:translateX(-50%);

}

</style>

</head>

<body>

<div id="title">
LUMIK AR ✨
</div>

<model-viewer

src="./assets/model.glb"

camera-controls

auto-rotate

autoplay

shadow-intensity="1"

exposure="1"

ar

ar-modes="scene-viewer quick-look webxr"

>

<button
slot="ar-button"
class="ar-button"
>
VIEW IN AR
</button>

</model-viewer>

<div id="info">
Interactive 3D + AR Experience
</div>

</body>

</html>
